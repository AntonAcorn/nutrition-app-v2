services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_app}
      POSTGRES_USER: ${POSTGRES_USER:-nutrition}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ../../storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrition} -d ${POSTGRES_DB:-nutrition_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutrition_app}
      DB_USER: ${POSTGRES_USER:-nutrition}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/actuator/health/readiness >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s

  frontend:
    build:
      context: ../../frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - ../../storage/caddy_data:/data
      - ../../storage/caddy_config:/config
