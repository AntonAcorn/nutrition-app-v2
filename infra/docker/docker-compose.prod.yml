services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nutrition_app}
      POSTGRES_USER: ${POSTGRES_USER:-nutrition}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ../../storage/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nutrition} -d ${POSTGRES_DB:-nutrition_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nutrition_app}
      DB_USER: ${POSTGRES_USER:-nutrition}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - ../../storage/caddy_data:/data
      - ../../storage/caddy_config:/config
