spring:
  application:
    name: nutrition-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nutrition_app}
    username: ${DB_USER:nutrition}
    password: ${DB_PASSWORD:nutrition}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

nutrition:
  import:
    enabled: ${NUTRITION_IMPORT_ENABLED:true}
    csv-path: ${NUTRITION_IMPORT_CSV_PATH:data/imports/nutrition-history.csv}
    default-user-ref: ${NUTRITION_DEFAULT_USER_REF:primary-user}
    default-user-name: ${NUTRITION_DEFAULT_USER_NAME:Anton}

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
