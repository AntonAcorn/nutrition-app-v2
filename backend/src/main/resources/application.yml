spring:
  application:
    name: nutrition-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nutrition_app}
    username: ${DB_USER:nutrition}
    password: ${DB_PASSWORD:nutrition}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

nutrition:
  photo-analysis:
    enabled: ${PHOTO_ANALYSIS_ENABLED:true}
    provider: ${PHOTO_ANALYSIS_PROVIDER:openai-stub}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout-ms: ${OPENAI_TIMEOUT_MS:25000}
