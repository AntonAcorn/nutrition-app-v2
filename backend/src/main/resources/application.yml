spring:
  application:
    name: nutrition-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nutrition_app}
    username: ${DB_USER:nutrition}
    password: ${DB_PASSWORD:nutrition}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

nutrition:
  import:
    enabled: ${NUTRITION_IMPORT_ENABLED:false}
    csv-path: ${NUTRITION_IMPORT_CSV_PATH:}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
