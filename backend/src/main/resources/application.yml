spring:
  application:
    name: nutrition-backend
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nutrition_app}
    username: ${DB_USER:nutrition}
    password: ${DB_PASSWORD:nutrition}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,email,profile
        provider:
          google:
            user-name-attribute: sub

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30d}
      cookie:
        max-age: ${SESSION_COOKIE_MAX_AGE:30d}
        same-site: lax

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

nutrition:
  app:
    base-url: ${APP_BASE_URL:http://localhost:5173}
  auth:
    enabled: false
    google-client-id: ${GOOGLE_CLIENT_ID:}
    google-client-secret: ${GOOGLE_CLIENT_SECRET:}
    google-redirect-uri: ${GOOGLE_REDIRECT_URI:${nutrition.app.base-url}/api/auth/google/callback}
  telegram:
    enabled: ${TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
  photo-analysis:
    enabled: ${PHOTO_ANALYSIS_ENABLED:true}
    provider: ${PHOTO_ANALYSIS_PROVIDER:openai-stub}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4.1-mini}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      timeout-ms: ${OPENAI_TIMEOUT_MS:25000}
